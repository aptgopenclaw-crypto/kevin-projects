server:
  port: 8080

spring:
  application:
    name: taipei-iot

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/mydb?currentSchema=iotdb
    username: postgres
    password: ${DB_PASSWORD}
    hikari:
      schema: iotdb
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: iotdb

  flyway:
    enabled: true
    out-of-order: true
    schemas:
      - iotdb
    default-schema: iotdb
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}

  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:10MB}
      max-request-size: ${FILE_MAX_REQUEST_SIZE:15MB}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000
  temporary-token-expiration: 300000

captcha:
  ttl: 300
  length: 4
  skip-verification: false  # 生產環境必須為 false；test profile 覆蓋為 true 以跳過驗證碼驗證
  turnstile:
    secret-key: ${TURNSTILE_SECRET_KEY:}   # Cloudflare Dashboard → Turnstile → Site → Secret Key
    site-key: ${TURNSTILE_SITE_KEY:}       # Cloudflare Dashboard → Turnstile → Site → Site Key

auth:
  cookie:
    secure: true
    same-site: Lax
    domain: ""
    path: /
    max-age: 604800

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  security:
    lock:
      max-fail-count: 5
      lock-duration-minutes: 10

tenant:
  mode: ${TENANT_MODE:multi}
  default-id: ${TENANT_DEFAULT_ID:DEFAULT}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

file:
  storage:
    local:
      root-dir: ${FILE_STORAGE_ROOT:./uploads}
  validation:
    max-size: ${FILE_MAX_SIZE:10485760}  # 10MB

virus-scan:
  enabled: ${VIRUS_SCAN_ENABLED:false}
  clamav:
    host: ${CLAMAV_HOST:localhost}
    port: ${CLAMAV_PORT:3310}
    timeout: ${CLAMAV_TIMEOUT:5000}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

user:
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    max-age-days: ${PASSWORD_MAX_AGE:90}
    history-count: 5

# ── Phase 7: IoT / MQTT ──────────────────────────────────
mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:taipei-iot-server}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}
  telemetry-topic: device/+/telemetry
  command-topic-prefix: device/
  qos: 1
  completion-timeout: 30000

iot:
  device-token:
    header-name: X-Device-Token
  no-signal-detection:
    enabled: ${IOT_NO_SIGNAL_ENABLED:true}
    interval-ms: ${IOT_NO_SIGNAL_INTERVAL:300000}
