spring:
  flyway:
    baseline-on-migrate: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: dev-only-secret-do-not-use-in-production-at-least-256-bits-long

auth:
  cookie:
    secure: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
