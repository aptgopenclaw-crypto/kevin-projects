spring:
  application:
    name: fix-data

  main:
    web-application-type: none   # 不啟動 Web Server，執行完即結束

  datasource:
    url: jdbc:postgresql://localhost:5432/mydb?currentSchema=fet_tenderdb
    username: postgres
    password: ${DB_PASSWORD:Kali1234!}
    hikari:
      schema: fet_tenderdb
      maximum-pool-size: 3

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: fet_tenderdb
    open-in-view: false

  flyway:
    enabled: false   # Schema 由 backend 管理，fix-data 不執行 migration

# 決標爬蟲設定
tender:
  award-scraper:
    request-delay-ms: 2000
    page-timeout-ms: 30000
    procurement-type-filter:
      - 工程
      - 財物
      - 勞務
  announcement-scraper:
    request-delay-ms: 2000
    page-timeout-ms: 30000
    procurement-type-filter:
      - 工程
      - 財物
      - 勞務

logging:
  level:
    com.taipei.iot: INFO
    org.hibernate.SQL: WARN
