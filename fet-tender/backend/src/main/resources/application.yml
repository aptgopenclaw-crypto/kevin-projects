server:
  port: 8080

spring:
  application:
    name: fet-tender

  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/mydb?currentSchema=tenderdb
    username: postgres
    password: 'Kali1234!'
    hikari:
      schema: tenderdb
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: tenderdb

  flyway:
    enabled: true
    out-of-order: true
    schemas:
      - tenderdb
    default-schema: tenderdb
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:Kali1234!}

  servlet:
    multipart:
      max-file-size: ${FILE_MAX_SIZE:10MB}
      max-request-size: ${FILE_MAX_REQUEST_SIZE:15MB}

  mail:
    host: smtp.office365.com
    port: 587
    username: ${TENDER_MAIL_USERNAME:}
    password: ${TENDER_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000
  temporary-token-expiration: 300000

captcha:
  ttl: 300
  length: 4
  skip-verification: false  # 生產環境必須為 false；test profile 覆蓋為 true 以跳過驗證碼驗證
  turnstile:
    secret-key: ${TURNSTILE_SECRET_KEY:}   # Cloudflare Dashboard → Turnstile → Site → Secret Key
    site-key: ${TURNSTILE_SITE_KEY:}       # Cloudflare Dashboard → Turnstile → Site → Site Key

auth:
  cookie:
    secure: true
    same-site: Lax
    domain: ""
    path: /
    max-age: 604800

app:
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  security:
    lock:
      max-fail-count: 5
      lock-duration-minutes: 10

tenant:
  mode: ${TENANT_MODE:multi}
  default-id: ${TENANT_DEFAULT_ID:DEFAULT}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

nvidia:
  ai:
    api-key: ${NVIDIA_API_KEY:}                              # NVIDIA API Key（請設定在 .env 或環境變數）
    base-url: https://integrate.api.nvidia.com/v1
    model: deepseek-ai/deepseek-v4-pro
    max-tokens: 2048
    temperature: 0.6

tender:
  scraper:
    request-delay-ms: ${TENDER_REQUEST_DELAY_MS:2000}   # 每次搜尋之間的延遲（毫秒），建議 >= 2000
    page-timeout-ms:  ${TENDER_PAGE_TIMEOUT_MS:30000}   # Playwright 頁面操作逾時（毫秒）
    cron: "0 26 13 * * MON-FRI"                         # 排程時間
    procurement-type-filter:                             # 採購性質過濾（空清單 = 不過濾）
      - 工程
      - 財物
      - 勞務
  mail:
    alias: ${TENDER_MAIL_ALIAS:政府採購公告}             # 寄件者顯示名稱
    recipients:                                          # 收件人清單（逗號分隔或 YAML 清單）
      - ${TENDER_MAIL_RECIPIENT_1:kevinchang4@fareastone.com.tw}

file:
  storage:
    local:
      root-dir: ${FILE_STORAGE_ROOT:./uploads}
  validation:
    max-size: ${FILE_MAX_SIZE:10485760}  # 10MB

virus-scan:
  enabled: ${VIRUS_SCAN_ENABLED:false}
  clamav:
    host: ${CLAMAV_HOST:localhost}
    port: ${CLAMAV_PORT:3310}
    timeout: ${CLAMAV_TIMEOUT:5000}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

user:
  password:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    max-age-days: ${PASSWORD_MAX_AGE:90}
    history-count: 5


